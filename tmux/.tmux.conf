set -g prefix C-Space
unbind C-b
bind C-Space send-prefix # underscore colours - needs tmux-3.0
# Bỏ qua xác nhận khi xóa pane
unbind x
bind x kill-pane

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm*:Tc"

bind-key C-c send-keys C-c
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tokyonight.nvim/blob/main/extras/tmux/tokyonight_storm.tmux'
# set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-processes 'nvim'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-save 'C-s'
set -g @resurrect-restore 'C-r'
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'
#Create new pane with path from current pane
bind-key c new-window -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
# Kích hoạt chế độ copy với phím Vim
setw -g mode-keys vi

# Sử dụng `v` để vào chế độ chọn trong copy mode (giống Vim)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection

# Điều hướng trong copy mode bằng phím Vim (h, j, k, l)
bind -T copy-mode-vi h send -X cursor-left
bind -T copy-mode-vi j send -X cursor-down
bind -T copy-mode-vi k send -X cursor-up
bind -T copy-mode-vi l send -X cursor-right

# Cuộn lên/xuống trong copy mode với Ctrl-u/d (giống Vim)
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down

# Thoát chế độ copy bằng ESC
bind -T copy-mode-vi Escape send -X cancel
#weather
# Resize pane using prefix + Alt + hjkl
bind -n M-h resize-pane -L    # Alt+h: Resize pane to the left
bind -n M-l resize-pane -R    # Alt+l: Resize pane to the right
bind -n M-j resize-pane -D    # Alt+j: Resize pane downward
bind -n M-k resize-pane -U    # Alt+k: Resize pane upward
#!/usr/bin/env bash
set -g @resurrect-hooks 'nvim load'

# TokyoNight colors for Tmux (ĐÃ CHỈNH SỬA TỪ ĐÂY)
# set -g mode-style "fg=#ff6ac1,bg=#3b4261"
# Transparent background for status bar
# Transparent background for status bar (using a specific color for dark background)
set -g status-style "fg=#a9b1d6,bg=default"   # Chọn màu chữ sáng và nền tối
set -g status-left-style "fg=#ff6ac1,bg=default"  # Màu chữ bên trái
set -g status-right-style "fg=#7aa2f7,bg=default" # Màu chữ bên phải

set -g mode-style "fg=#ff6ac1,bg=#3b4261"


set -g message-command-style "fg=#7aa2f7,bg=#3b4261"
set -g message-style "fg=#ff6ac1,bg=#3b4261"

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#339999"

set -g status "on"
set -g status-justify "left"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left "#[fg=#ff6ac1,bg=#3b4261,bold]  #S #[fg=#3b4261,bg=default,nobold,nounderscore,noitalics]"

set -g status-right "#[fg=#a9b1d6,bg=default] #{prefix_highlight} #[fg=#3b4261,bg=default,nobold,nounderscore,noitalics]#[fg=default,bg=#3b4261,bold] #{weather} #[fg=#1f2335,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#ff6ac1,bg=#1f2335,nobold,nounderscore,noitalics]#[fg=#1f2335,bg=#ff6ac1,nobold,nounderscore,noitalics]󰃰 #[fg=#3b4261,bg=#ff6ac1,nobold,nounderscore,noitalics]#[fg=#ff6ac1,bg=#3b4261, bold] %d %b | %I:%M %p #[fg=#1f2335,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#3b4261,bg=#1f2335,nobold,nounderscore,noitalics]#[fg=default,bg=#3b4261,bold] #h #[default]"

# if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
#   set -g status-right "#[fg=#1f2335,bg=default,nobold,nounderscore,noitalics]#[fg=#a9b1d6,bg=default] #{prefix_highlight} #[fg=#3b4261,bg=default,nobold,nounderscore,noitalics]#[fg=#ff6ac1,bg=#3b4261,bold] #{weather} #[fg=#1f2335,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#a9b1d6,bg=default] %Y-%m-%d  %H:%M #[fg=#7aa2f7,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#1d202f,bg=#7aa2f7,bold] #h "
# }

setw -g window-status-activity-style "underscore,fg=#7aa2f7,bg=default, bold"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a9b1d6,bg=default"
setw -g window-status-format "#[fg=#24283b,bg=#1f2235,nobold,nounderscore,noitalics]#[fg=default, bg=#1f2335]  #I  #W #F #[fg=#1f2335,bg=default,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#24283b,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261,bold] #I  #W #F #[fg=#3b4261,bg=default,nobold,nounderscore,noitalics]"

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "#[fg=#ff6ac1]#[bg=#1f2335]#[fg=#1f2335]#[bg=#ff6ac1]"
set -g @prefix_highlight_output_suffix ""

# KẾT THÚC PHẦN CHỈNH SỬA

run '~/.tmux/plugins/tpm/tpm'
run -b '~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
