set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Bل»ڈ qua xأ،c nhل؛­n khi xأ³a pane
unbind x
bind x kill-pane

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm*:Tc"

bind-key C-c send-keys C-c

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-processes 'nvim'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-save 'C-s'
set -g @resurrect-restore 'C-r'

# Create new pane with path from current pane
bind-key c new-window -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

# Kأ­ch hoل؛،t chل؛؟ ؤ‘ل»™ copy vل»›i phأ­m Vim
setw -g mode-keys vi

# Copy mode bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi h send -X cursor-left
bind -T copy-mode-vi j send -X cursor-down
bind -T copy-mode-vi k send -X cursor-up
bind -T copy-mode-vi l send -X cursor-right
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi Escape send -X cancel

# Resize pane using Alt + hjkl
bind -n C-M-h resize-pane -L
bind -n C-M-l resize-pane -R
bind -n C-M-j resize-pane -D
bind -n C-M-k resize-pane -U

set -g @resurrect-hooks 'nvim load'

# ===== TMUX TRANSPARENT THEME (TokyoNight inspired) =====

# Transparent background cho status bar
set -g status-style "fg=#c0caf5,bg=default"
set -g status-left-style "fg=#bb9af7,bg=default"
set -g status-right-style "fg=#7aa2f7,bg=default"

# Mode style (copy mode, selection)
set -g mode-style "fg=#ff6ac1,bg=#3b4261"

# Message styles
set -g message-command-style "fg=#7aa2f7,bg=#3b4261"
set -g message-style "fg=#ff6ac1,bg=#3b4261"

# Pane borders (trong suل»‘t hئ،n)
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Status bar settings
set -g status "on"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# Status left - Session name (transparent background)
set -g status-left "#[fg=#bb9af7,bg=default,bold]  #S #[fg=default,bg=default] "

# Status right - Time and host (transparent background)
set -g status-right "#[fg=#7aa2f7,bg=default]َ°ƒ° %d %b | %I:%M %p #[fg=#c0caf5,bg=default]  #h "

# Window status (inactive windows - transparent)
setw -g window-status-activity-style "underscore,fg=#7aa2f7,bg=default,bold"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a9b1d6,bg=default"
setw -g window-status-format "#[fg=#565f89,bg=default]  #I #W #F "

# Window status (active window - slight highlight but still transparent)
setw -g window-status-current-format "#[fg=#7aa2f7,bg=default,bold]  #I #W #F "

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "#[fg=#ff6ac1,bg=default]"
set -g @prefix_highlight_output_suffix ""

# ===== END TRANSPARENT THEME =====

run '~/.tmux/plugins/tpm/tpm'
run -b '~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
